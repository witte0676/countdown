<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown</title>

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 20px;
      text-align: center;
    }

    input, button {
      padding: 10px;
      font-size: 1rem;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    input {
      width: 90%;
      background: #111;
      color: #fff;
      border: 1px solid #444;
    }

    button {
      background: #1e90ff;
      color: white;
      width: 95%;
    }

    #output {
      margin-top: 25px;
      font-size: 1.4rem;
      line-height: 2.2rem;
    }
  </style>
</head>
<body>

  <h2>Countdown</h2>

  <p>Ziel-Datum & Uhrzeit:</p>
  <input type="datetime-local" id="target">

  <button onclick="startCountdown()">Start</button>

  <div id="output">Noch kein Countdown gestartet.</div>

  <script>
    let timer = null;

    function startCountdown() {
      const input = document.getElementById("target").value;
      if (!input) {
        document.getElementById("output").innerHTML = "Bitte Datum wählen.";
        return;
      }

      const targetTime = new Date(input).getTime();
      if (isNaN(targetTime)) {
        document.getElementById("output").innerHTML = "Ungültiges Datum.";
        return;
      }

      if (timer) clearInterval(timer);

      timer = setInterval(() => {
        const now = Date.now();
        const diff = targetTime - now;

        if (diff <= 0) {
          clearInterval(timer);
          document.getElementById("output").innerHTML = "Ziel erreicht!";
          return;
        }

        const sec = Math.floor(diff / 1000);
        const days = Math.floor(sec / 86400);
        const hours = Math.floor((sec % 86400) / 3600);
        const minutes = Math.floor((sec % 3600) / 60);
        const seconds = sec % 60;

        document.getElementById("output").innerHTML =
          days + " Tage<br>" +
          hours.toString().padStart(2, "0") + " Stunden<br>" +
          minutes.toString().padStart(2, "0") + " Minuten<br>" +
          seconds.toString().padStart(2, "0") + " Sekunden";
      }, 1000);
    }
  </script>

</body>
</html>
